<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LivestockHub - Login & Register</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #000000 0%, #1a0000 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #e5e5e5;
        }

        .auth-container {
            background: #111111;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            overflow: hidden;
            max-width: 450px;
            width: 100%;
        }

        .auth-header {
            background: linear-gradient(135deg, #000000 0%, #2b0000 100%);
            color: #00ff9f;
            padding: 2rem;
            text-align: center;
            text-shadow: 0 0 10px rgba(0,255,159,0.6);
        }

        .auth-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            opacity: 0.8;
            font-size: 1.1rem;
            color: #aaa;
        }

        .auth-tabs {
            display: flex;
            background: #0d0d0d;
        }

        .tab-btn {
            flex: 1;
            padding: 1rem;
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            color: #888;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
        }

        .tab-btn.active {
            background: #111;
            color: #00ff9f;
            border-bottom-color: #00ff9f;
            font-weight: 600;
        }

        .auth-form {
            padding: 2.5rem;
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #ccc;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 1rem 1rem 1rem 2.5rem;
            border: 2px solid #222;
            border-radius: 12px;
            font-size: 1rem;
            background: #0d0d0d;
            color: #e5e5e5;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #00ff9f;
            background: #000;
            box-shadow: 0 0 10px rgba(0,255,159,0.3);
        }

        .form-group i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #00ff9f;
        }

        .btn-primary {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #ff0033, #660000);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(255,0,51,0.6);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(255,0,51,0.9);
        }

        .toggle-link {
            text-align: center;
            margin-top: 1.5rem;
            color: #888;
        }

        .toggle-link a {
            color: #00ff9f;
            text-decoration: none;
            font-weight: 600;
            text-shadow: 0 0 5px rgba(0,255,159,0.6);
        }

        .error-message {
            background: rgba(255, 0, 51, 0.1);
            color: #ff0033;
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
            border: 1px solid #ff0033;
        }

        @media (max-width: 480px) {
            .auth-container {
                margin: 1rem;
            }
            
            .auth-header {
                padding: 1.5rem;
            }
        }
    </style>
</head>

<body>

    <main class="auth-container">
        <header class="auth-header">
            <h1>🐄 LivestockHub</h1>
            <p>Secure Access to Premium Feed Market</p>
        </header>

        <nav class="auth-tabs">
            <button class="tab-btn active" data-tab="login">Login</button>
            <button class="tab-btn" data-tab="register">Register</button>
        </nav>

        <div id="errorMsg" class="error-message"></div>

        <!-- Login -->
        <form id="loginForm" class="auth-form active">
            <div class="form-group">
                <label>Email</label>
                <i>📧</i>
                <input type="email" id="loginEmail" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <i>🔒</i>
                <input type="password" id="loginPassword" required>
            </div>

            <button type="submit" class="btn-primary">Access System</button>
        </form>

        <!-- Register -->
        <form id="registerForm" class="auth-form">
            <div class="form-group">
                <label>Full Name</label>
                <i>👤</i>
                <input type="text" id="regName" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <i>📧</i>
                <input type="email" id="regEmail" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <i>🔒</i>
                <input type="password" id="regPassword" required>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <i>🔐</i>
                <input type="password" id="regConfirmPassword" required>
            </div>

            <button type="submit" class="btn-primary">Create Account</button>
        </form>

        <div class="toggle-link">
            <span>Demo Access: </span>
            <a href="#" onclick="demoLogin()">xbo@farm.com / xbo123</a>
        </div>
    </main>

    <script>
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.dataset.tab;

                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
                document.getElementById(tab + 'Form').classList.add('active');

                document.getElementById('errorMsg').style.display = 'none';
            });
        });

        function demoLogin() {
            document.getElementById('loginEmail').value = 'xbo@farm.com';
            document.getElementById('loginPassword').value = 'xbo123';
        }

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            if (email === 'xbo@farm.com' && password === 'xbo123') {
                localStorage.setItem('isLoggedIn', 'true');
                window.location.href = 'Face.html';
            } else {
                showError('ACCESS DENIED ❌');
            }
        });

        document.getElementById('registerForm').addEventListener('submit', (e) => {
            e.preventDefault();

            const pass = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;

            if (pass !== confirm) {
                showError('PASSWORD MISMATCH ⚠️');
                return;
            }

            localStorage.setItem('isLoggedIn', 'true');
            window.location.href = 'Login.html';
        });

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
        }
    </script>

</body>
</html>
