<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us - LivestockHub</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #000000, #1a0000);
    color: #e5e5e5;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
}

/* Container */
.container {
    max-width: 800px;
    width: 90%;
    background: #111;
    padding: 2.5rem;
    border-radius: 20px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.9);
    border: 1px solid rgba(0, 255, 159, 0.2);
    animation: fadeIn 0.8s ease;
}

/* Title */
h1 {
    color: #00ff9f;
    margin-bottom: 1rem;
    text-shadow: 0 0 10px rgba(0,255,159,0.6);
}

/* Contact info */
.contact-info {
    margin-top: 1rem;
    line-height: 1.8;
    color: #bbb;
}

/* Highlight labels */
.contact-info strong {
    color: #00ff9f;
}

/* Button */
.back-btn {
    display: inline-block;
    margin-top: 25px;
    text-decoration: none;
    background: linear-gradient(135deg, #ff0033, #660000);
    color: white;
    padding: 12px 25px;
    border-radius: 12px;
    font-weight: 600;
    transition: all 0.3s ease;
    box-shadow: 0 0 10px rgba(255,0,51,0.6);
}

.back-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 0 20px rgba(255,0,51,0.9);
}

/* Animation */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

</style>
</head>

<body>

<div class="container">
    <h1>📞 Contact LivestockHub</h1>

    <div class="contact-info">
        <p><strong>Phone:</strong> 09901001222</p>
        <p><strong>Email:</strong> livestockhub@gmail.com</p>
        <p><strong>Location:</strong> Area 69, Philippines</p>
    </div>

    <a href="Face.html" class="back-btn">← Return to Shop</a>
</div>

</body>
</html>
