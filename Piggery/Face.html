<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LivestockHub - Premium Feed Store</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
    --primary: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
    --secondary: linear-gradient(135deg, #111111 0%, #2b0000 100%);
    --success: #00ff9f; /* neon green */
    --danger: #ff0033;  /* neon red */
    --warning: #ffcc00;
    --dark: #0a0a0a;
    --light: #111111;
}

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
           color: #e5e5e5;
    background: #0a0a0a;
        }

        /* Header */
        header {
            background: #111;
            box-shadow: 0 2px 15px rgba(0,0,0,0.8);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            color: #00ff9f; /* neon green */
            font-size: 1.8rem;
            font-weight: bold;
            background: var(--primary);
            -webkit-background-clip: text;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .cart-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--light);
            padding: 0.5rem 1rem;
            border-radius: 25px;
            font-weight: 500;
            cursor: pointer;
        }

        .cart-count {
            background: #00ff9f;
             color: black;
             box-shadow: 0 0 10px #00ff9f;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .logout-btn {
             background: #ff0033;
            box-shadow: 0 0 10px rgba(255, 0, 51, 0.7);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4);
        }

        /* Main Content */
        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .hero {
            text-align: center;
            margin-bottom: 3rem;
            padding: 2rem;
            background: #141414;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
        }

        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: #00ff9f; /* neon green */
    text-shadow: 0 0 10px rgba(0, 255, 159, 0.7);
    background: var(--primary);
    -webkit-background-clip: text;
    background-clip: text;
}
        

        .hero p {
            font-size: 1.2rem;
            color: #aaa;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .product-card {
            background: #141414;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
            transition: all 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .product-image {
            height: 200px;
            background: linear-gradient(45deg, #f0f9ff, #e0f2fe);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
        }

        .product-info {
            padding: 1.5rem;
        }

        .product-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #f5f5f5;
        }

        .product-price {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--success);
            margin-bottom: 1rem;
        }

        .product-description {
            color: #999;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .add-to-cart {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #ff0033, #660000);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .add-to-cart:hover:not(:disabled) {
            transform: translateY(-2px);
        }

        .add-to-cart:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        /* Cart Sidebar */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -400px;
            width: 400px;
            height: 100vh;
            background: #141414;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
            transition: right 0.3s ease;
            z-index: 200;
            padding: 2rem;
            overflow-y: auto;
        }

        .cart-sidebar.open {
            right: 0;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #eee;
        }

        .close-cart {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #666;
        }

        .cart-item {
            display: flex;
            gap: 1rem;
            padding: 1rem 0;
            border-bottom: 1px solid #eee;
        }

        .cart-item-image {
    width: 60px;
    height: 60px;
    border-radius: 10px;
    background: #f0f9ff;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden; /* This is the "fix" to keep the image inside the box */
    flex-shrink: 0;   /* Prevents the image box from squishing */
}

.cart-item-image img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* Ensures the thumbnail looks centered and cropped correctly */
}

        .cart-item-details h4 {
            margin-bottom: 0.25rem;
            font-size: 1rem;
        }

        .cart-item-price {
            color: var(--success);
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .remove-item {
            background: var(--danger);
            color: white;
            border: none;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .cart-total {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 2px solid #333;
            text-align: center;
        }

        .total-price {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--success);
            margin-bottom: 1rem;
        }

        .checkout-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #00ff9f, #004d33);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
        }

        /* Overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 150;
        }

        .overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* Navigation Links Styling */
.nav-links {
    display: flex;
    gap: 1.5rem;
    margin-right: 1rem;
}

.nav-link {
    text-decoration: none;
    color: #00ff9f; /* neon green */
    font-weight: 600;
    font-size: 0.95rem;
    transition: all 0.3s ease;
    padding: 0.5rem 0.8rem;
    border-radius: 8px;
}

.nav-link:hover {
    color: #00ff9f;
    background: rgba(0, 255, 159, 0.1);
}

/* Update this in your <style> section */
.product-image {
    height: 200px;
    background: #0d0d0d;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden; /* Keeps image inside the rounded corners */
}

.product-image img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* This prevents the photo from looking stretched */
}

/* Mobile adjustment for nav links */
@media (max-width: 768px) {
    .nav-links {
        display: none; /* Hides links on small screens to save space, or you can keep them */
    }
}

        /* Responsive */
        @media (max-width: 768px) {
            .cart-sidebar {
                width: 100%;
                right: -100%;
            }

            .products-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }

            .header-container {
                padding: 1rem;
            }

            main {
                padding: 0 1rem;
                margin: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Check if user is logged in -->
    <script>
        if (!localStorage.getItem('isLoggedIn')) {
            window.location.href = 'Login.html';
        }
    </script>

    <header>
        <div class="header-container">
            <div class="logo">🐄 LivestockHub</div>
            <div class="header-actions">
                <nav class="nav-links">
        <a href="About_us.html" class="nav-link">About Us</a>
        <a href="Contact_us.html" class="nav-link">Contact Us</a>
    </nav>
                <div class="cart-info" id="cartToggle">
                    🛒 Cart
                    <span class="cart-count" id="cartCount">0</span>
                </div>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>
    </header>

    <main>
        <section class="hero">
            <h1>Premium Pasaw sa mga Kahayupan</h1>
            <p>Kalidad, Tam-is, ug Lamian nga Pasaw alang sa imong Animals.</p>
        </section>

        <section class="products-grid" id="productsGrid">
            <!-- Products will be populated by JavaScript -->
        </section>
    </main>

    <!-- Cart Sidebar -->
    <aside class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h2>🛒 Shopping Cart</h2>
            <button class="close-cart" id="closeCart">&times;</button>
        </div>
        <div id="cartItems"></div>
        <div class="cart-total">
            <div class="total-price" id="cartTotal">₱0.00</div>
            <button class="checkout-btn" onclick="checkout()">Proceed to Checkout</button>
        </div>
    </aside>

    <!-- Overlay -->
    <div class="overlay" id="overlay"></div>

    <script>
        // Product data
        const products = [
            {
                id: 1,
                name: "🐄 Pasaw sa Baka - 7 Kinds",
                price: 145.99,
                image: "images/cow1.jpg",
                description: "20% pure pang Baka, 80% pure pang Balbacua."
            },
            {
                id: 2,
                name: "🐔 Pasaw sa Manok - 7 Kinds",
                price: 128.50,
                image: "images/chicken.png",
                description: "7 kinds? Yes, 7 kinds sa Fried Chicken imong mahimo."
            },
            {
                id: 3,
                name: "🐖 Pasaw sa Baboy - 7 Kinds",
                price: 139.99,
                image: "images/pigs.webp",
                description: "Unlimited pork chop ug kaya nimo buhi-on."
            },
            {
                id: 4,
                name: "🐐 Pasaw sa Kanding - 7 Kinds",
                price: 132.75,
                image: "images/goatss.webp",
                description: "Automatic home-made boba gikan sa imong alaga."
            },
            {
                id: 5,
                name: "🐑 Pasaw sa Puti na Kanding",
                price: 141.25,
                image: "images/sheeps.webp",
                description: "18% walay sagol hilo alang kanimo."
            },

            {
                id: 6,
                name: "🐄 Tangkal sa Baka",
                price: 545.99,
                image: "images/cowcage.jpg",
                
            },
            {
                id: 7,
                name: "🐔 Tangkal sa Manok",
                price: 28.50,
                image: "images/chickencage.jpg",
                
            },
            {
                id: 8,
                name: "🐖 Tangkal sa Baboy",
                price: 339.99,
                image: "images/pigcage.jpg",
                
            },
            {
                id: 9,
                name: "🐐 Tangkal sa Kanding",
                price: 432.75,
                image: "images/goatcage.jpg",
                
            },
            
        ];

        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        // Initialize app
        document.addEventListener('DOMContentLoaded', function() {
            renderProducts();
            renderCart();
            setupEventListeners();
        });

        function renderProducts() {
    const grid = document.getElementById('productsGrid');
    grid.innerHTML = products.map(product => `
        <article class="product-card">
            <div class="product-image">
                <img src="${product.image}" alt="${product.name}" style="width:100%; height:100%; object-fit:cover;">
            </div>
            <div class="product-info">
                <h3 class="product-title">${product.name}</h3>
                <div class="product-price">₱${product.price.toFixed(2)}</div>
                <p class="product-description">${product.description || ''}</p>
                <button class="add-to-cart" onclick="addToCart(${product.id})">
                    Add to Cart
                </button>
            </div>
        </article>
            `).join('');
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);
            
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
            updateCartCount();
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
            updateCartCount();
            renderProducts();
        }

        function renderCart() {
    const cartItemsEl = document.getElementById('cartItems');
    const cartTotalEl = document.getElementById('cartTotal');
    
    if (cart.length === 0) {
        cartItemsEl.innerHTML = '<p style="text-align: center; color: #666; padding: 2rem;">Your cart is empty</p>';
        cartTotalEl.textContent = '₱0.00';
        return;
    }
    
    cartItemsEl.innerHTML = cart.map(item => `
        <div class="cart-item">
            <div class="cart-item-image">
                <img src="${item.image}" alt="${item.name}" style="width:100%; height:100%; object-fit:cover; border-radius:8px;">
            </div>
            <div class="cart-item-details">
                <h4>${item.name}</h4>
                <div class="cart-item-price">₱${item.price.toFixed(2)} x ${item.quantity}</div>
            </div>
            <button class="remove-item" onclick="removeFromCart(${item.id})">Remove</button>
        </div>
    `).join('');
    
    const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
    cartTotalEl.textContent = `₱${total.toFixed(2)}`;
}

        function updateCartCount() {
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartCount').textContent = count;
        }

        function setupEventListeners() {
            // Cart toggle
            document.getElementById('cartToggle').addEventListener('click', toggleCart);
            document.getElementById('closeCart').addEventListener('click', toggleCart);
            document.getElementById('overlay').addEventListener('click', toggleCart);
        }

        function toggleCart() {
            const sidebar = document.getElementById('cartSidebar');
            const overlay = document.getElementById('overlay');
            
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        }

        function checkout() {
            if (cart.length === 0) {
                alert('Your cart is empty!');
                return;
            }
            
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            alert(`Thank you for your order! Total: ₱${total.toFixed(2)}\n\nOrder confirmed! 🐄✨`);
            cart = [];
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
            updateCartCount();
            toggleCart();
        }

        function logout() {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('cart');
            window.location.href = 'Login.html';
        }
    </script>
</body>
</html>
